<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>US Accounting Pro</title>

<!-- Firebase (compat SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Export libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --blue:#1e5fbf;
    --blue-dark:#134a91;
    --green:#1a9e5c;
    --red:#d6323c;
    --gold:#c9971f;
    --bg:#ffffff;
    --bg-soft:#f5f7fa;
    --text:#1f2937;
    --text-soft:#6b7280;
    --border:#e3e7ee;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-soft);
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:100%;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    box-shadow:none;
  }
  @media (min-width:601px){
    #app{
      max-width:480px;
      box-shadow:0 0 24px rgba(0,0,0,0.06);
    }
  }
  .header{
    background:var(--blue);
    color:#fff;
    padding:18px 16px;
    font-size:21px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
    position:sticky;
    top:0;
    z-index:10;
  }
  .header .sync-dot{
    width:9px;height:9px;border-radius:50%;
    background:#9ee6b8;
    margin-left:auto;
    flex-shrink:0;
  }
  .header .sync-dot.off{background:#f3c96b;}
  .subheader{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    background:#fff;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:10;
  }
  .subheader h2{
    font-size:18.5px;
    margin:0;
    font-weight:700;
    flex:1;
  }
  .back-btn{
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    font-size:16px;
    font-weight:600;
    color:var(--text);
    cursor:pointer;
    flex-shrink:0;
  }
  .icon-btn{
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    font-size:15px;
    font-weight:600;
    color:var(--blue);
    cursor:pointer;
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .content{
    flex:1;
    padding:16px;
    padding-bottom:90px;
  }
  /* Login */
  .login-wrap{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px;
    gap:18px;
    background:linear-gradient(180deg,var(--blue) 0%, var(--blue) 130px, var(--bg-soft) 130px);
  }
  .login-card{
    background:#fff;
    border-radius:var(--radius);
    padding:28px 22px;
    width:100%;
    max-width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    text-align:center;
  }
  .login-card .logo{font-size:40px;margin-bottom:6px;}
  .login-card h1{font-size:20px;margin:4px 0 4px;}
  .login-card p{color:var(--text-soft);font-size:13px;margin:0 0 18px;}
  input[type=password], input[type=text], input[type=number], input[type=date], select, textarea{
    width:100%;
    padding:14px 13px;
    font-size:16.5px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:var(--text);
    margin-bottom:12px;
    font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{
    outline:2px solid var(--blue);
    outline-offset:1px;
  }
  label{
    display:block;
    font-size:14px;
    font-weight:600;
    color:var(--text-soft);
    margin-bottom:7px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    color:#fff;
  }
  .btn-blue{background:var(--blue);}
  .btn-green{background:var(--green);}
  .btn-red{background:var(--red);}
  .btn-gold{background:var(--gold);}
  .btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
  .btn-sm{width:auto;padding:10px 14px;font-size:13.5px;}
  .error-msg{color:var(--red);font-size:13px;margin-top:8px;min-height:16px;}
  .success-msg{color:var(--green);font-size:13px;margin-top:8px;min-height:16px;}
  /* Dashboard */
  .balance-cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:18px;
  }
  .bal-card{
    border-radius:var(--radius);
    padding:16px 14px;
    color:#fff;
  }
  .bal-card.debit{background:linear-gradient(135deg,var(--red),#a4222b);}
  .bal-card.credit{background:linear-gradient(135deg,var(--green),#127a46);}
  .bal-card .lbl{font-size:12.5px;opacity:.9;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .bal-card .val{font-size:25px;font-weight:800;margin-top:6px;}
  .grid-2x2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .grid-btn{
    background:#fff;
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:26px 10px;
    text-align:center;
    font-weight:700;
    font-size:15.5px;
    color:var(--text);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:9px;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
  }
  .grid-btn .ic{font-size:30px;}
  .grid-btn.full{grid-column:1/-1;flex-direction:row;padding:16px;gap:10px;font-size:15.5px;}
  .grid-btn.full .ic{font-size:22px;}
  .fab{
    position:fixed;
    bottom:24px;
    right:20px;
    width:58px;height:58px;
    border-radius:50%;
    background:var(--gold);
    color:#fff;
    font-size:28px;
    border:none;
    box-shadow:0 6px 16px rgba(201,151,31,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:20;
  }
  @media (min-width:601px){
    .fab{ right:calc(50% - 240px + 20px); }
  }
  /* Entry form */
  .voucher-badge{
    display:inline-block;
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-radius:20px;
    padding:6px 14px;
    font-size:13px;
    font-weight:700;
    color:var(--blue);
    margin-bottom:16px;
  }
  .voucher-badge.edit-mode{color:var(--gold);}
  .req{color:var(--red);}
  /* Back office */
  .card-section{
    background:#fff;
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 2px 6px rgba(0,0,0,0.03);
  }
  .card-section h3{
    font-size:14.5px;
    font-weight:800;
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:7px;
    color:var(--blue-dark);
  }
  .add-account-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .add-account-row input{margin-bottom:0;}
  .add-account-row button{
    flex-shrink:0;
    width:auto;
    padding:12px 16px;
  }
  .acc-list{
    list-style:none;
    margin:0;padding:0;
  }
  .acc-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 14px;
    background:var(--bg-soft);
    border-radius:8px;
    margin-bottom:8px;
    font-weight:600;
    font-size:14px;
  }
  .acc-item:last-child{margin-bottom:0;}
  .acc-item .acc-name{display:flex;align-items:center;gap:8px;}
  .acc-item .acc-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;}
  .acc-item button{
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:6px 10px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .empty-state{
    text-align:center;
    color:var(--text-soft);
    padding:30px 12px;
    font-size:13.5px;
  }
  /* View Records - Table */
  .table-wrap{
    overflow-x:auto;
    border:1px solid var(--border);
    border-radius:10px;
    -webkit-overflow-scrolling:touch;
  }
  table.rec-table{
    border-collapse:collapse;
    width:100%;
    min-width:820px;
    font-size:13.5px;
  }
  table.rec-table th, table.rec-table td{
    padding:11px 10px;
    text-align:left;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  table.rec-table thead th{
    background:var(--bg-soft);
    font-weight:800;
    color:var(--blue-dark);
    cursor:pointer;
    position:sticky;
    top:0;
    user-select:none;
  }
  table.rec-table thead th .arrow{font-size:10px;color:var(--gold);margin-left:3px;}
  table.rec-table tr.filter-row td{
    background:#fbfcfe;
    padding:6px 6px;
  }
  table.rec-table tr.filter-row input{
    margin-bottom:0;
    padding:6px 7px;
    font-size:12px;
    min-width:70px;
  }
  table.rec-table td.num{text-align:right;font-weight:700;}
  table.rec-table td.debit-col{color:var(--red);}
  table.rec-table td.credit-col{color:var(--green);}
  table.rec-table td.desc-col{white-space:normal;min-width:130px;}
  .row-actions{display:flex;gap:6px;}
  .row-actions button{
    border:none;
    border-radius:6px;
    padding:6px 9px;
    font-size:11.5px;
    font-weight:700;
    cursor:pointer;
    color:#fff;
  }
  .row-actions .edit-b{background:var(--gold);}
  .row-actions .del-b{background:var(--red);}
  .table-hint{font-size:11.5px;color:var(--text-soft);margin:8px 2px 14px;}
  /* Reports */
  .report-tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .report-tab{
    flex:1;
    padding:11px;
    text-align:center;
    border-radius:8px;
    border:1px solid var(--border);
    font-weight:700;
    font-size:13.5px;
    background:#fff;
    cursor:pointer;
    color:var(--text-soft);
  }
  .report-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .ledger-row{
    display:grid;
    grid-template-columns:1.1fr 1.6fr 0.9fr 0.9fr 1fr;
    gap:4px;
    font-size:11.5px;
    padding:8px 4px;
    border-bottom:1px solid var(--border);
    align-items:center;
  }
  .ledger-row.head{font-weight:800;color:var(--text-soft);text-transform:uppercase;font-size:9.5px;}
  .ledger-row .num{text-align:right;font-weight:700;}
  .summary-box{
    background:var(--bg-soft);
    border-radius:var(--radius);
    padding:16px;
    margin-top:16px;
  }
  .summary-row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    font-size:15px;
    font-weight:700;
    border-bottom:1px solid var(--border);
  }
  .summary-row:last-child{border-bottom:none;}
  .summary-row .debit-val{color:var(--red);}
  .summary-row .credit-val{color:var(--green);}
  .summary-row.diff .zero{color:var(--green);}
  .summary-row.diff .nonzero{color:var(--red);}
  .summary-row .pos{color:var(--green);}
  .summary-row .neg{color:var(--red);}
  .field-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    color:#fff;
    padding:11px 20px;
    border-radius:24px;
    font-size:13.5px;
    font-weight:600;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s;
    max-width:90%;
    text-align:center;
  }
  .toast.show{opacity:1;}
  .hint{font-size:12px;color:var(--text-soft);margin:-6px 0 14px;}
  .divider-or{
    text-align:center;
    font-size:11px;
    color:var(--text-soft);
    margin:-4px 0 10px;
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  /* Modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
  }
  .modal-box{
    background:#fff;
    border-radius:var(--radius);
    padding:22px;
    width:100%;
    max-width:340px;
    box-shadow:0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-box h3{
    margin:0 0 6px;
    font-size:16px;
    font-weight:800;
  }
  .modal-box p{
    margin:0 0 14px;
    font-size:13px;
    color:var(--text-soft);
  }
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:6px;
  }
  .modal-actions .btn{padding:11px;font-size:14px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   US ACCOUNTING PRO
   Single-file app. Firebase Firestore sync + LocalStorage offline.

   >>> TO ENABLE CLOUD SYNC <<<
   Replace the placeholder values in FIREBASE_CONFIG below with
   your own Firebase project's config (Project Settings > General
   > Your apps > SDK setup and configuration).
   Until you do, the app runs fully offline using only the
   browser's LocalStorage (single device, no cross-device sync).
   ============================================================ */

const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const LS_KEYS = {
  accounts: "usap_accounts",
  subAccounts: "usap_subaccounts",
  entries: "usap_entries",
  password: "usap_password"
};

let state = {
  accounts: [],       // [{id, name}]
  subAccounts: [],    // [{id, name}]
  entries: [],         // [{id, ref, date, account, subAccount, description, debit, credit, createdAt}]
  screen: "login",
  loggedIn: false,
  reportTab: "ledger",
  editingRef: null,    // set when editing an existing voucher
  viewFilters: { date:"", account:"", subAccount:"", description:"", ref:"", debit:"", credit:"" },
  sortCol: "ref",
  sortDir: "desc",
  _ledgerAccount: "",
  _ledgerSub: "",
  _ledgerFrom: "",
  _ledgerTo: "",
  _balFrom: "",
  _balTo: "",
  _balSub: "",
  modal: null // {title, message, requirePassword, onConfirm}
};

let db = null;
let firebaseEnabled = false;

// ---------- Firebase init (only if config looks real) ----------
function isConfigured(cfg){
  return cfg.apiKey && !cfg.apiKey.startsWith("YOUR_") &&
         cfg.projectId && !cfg.projectId.startsWith("YOUR_");
}

function initFirebase(){
  if(!isConfigured(FIREBASE_CONFIG)) { firebaseEnabled = false; return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    firebaseEnabled = true;
    listenAccounts();
    listenSubAccounts();
    listenEntries();
  }catch(e){
    console.warn("Firebase init failed, falling back to LocalStorage only.", e);
    firebaseEnabled = false;
  }
}

function listenAccounts(){
  db.collection("accounts").orderBy("name").onSnapshot(snap=>{
    state.accounts = snap.docs.map(d=>({id:d.id, ...d.data()}));
    localStorage.setItem(LS_KEYS.accounts, JSON.stringify(state.accounts));
    render();
  }, err=>{ console.warn(err); });
}

function listenSubAccounts(){
  db.collection("subAccounts").orderBy("name").onSnapshot(snap=>{
    state.subAccounts = snap.docs.map(d=>({id:d.id, ...d.data()}));
    localStorage.setItem(LS_KEYS.subAccounts, JSON.stringify(state.subAccounts));
    render();
  }, err=>{ console.warn(err); });
}

function listenEntries(){
  db.collection("entries").orderBy("ref").onSnapshot(snap=>{
    state.entries = snap.docs.map(d=>({id:d.id, ...d.data()}));
    localStorage.setItem(LS_KEYS.entries, JSON.stringify(state.entries));
    render();
  }, err=>{ console.warn(err); });
}

// ---------- LocalStorage fallback ----------
function loadLocal(){
  try{ state.accounts = JSON.parse(localStorage.getItem(LS_KEYS.accounts)) || []; }catch(e){ state.accounts = []; }
  try{ state.subAccounts = JSON.parse(localStorage.getItem(LS_KEYS.subAccounts)) || []; }catch(e){ state.subAccounts = []; }
  try{ state.entries = JSON.parse(localStorage.getItem(LS_KEYS.entries)) || []; }catch(e){ state.entries = []; }
}
function saveLocalAccounts(){ localStorage.setItem(LS_KEYS.accounts, JSON.stringify(state.accounts)); }
function saveLocalSubAccounts(){ localStorage.setItem(LS_KEYS.subAccounts, JSON.stringify(state.subAccounts)); }
function saveLocalEntries(){ localStorage.setItem(LS_KEYS.entries, JSON.stringify(state.entries)); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

// ---------- Data operations: Accounts ----------
function addAccount(name){
  name = name.trim();
  if(!name) return;
  if(state.accounts.some(a=>a.name.toLowerCase()===name.toLowerCase())){
    showToast("Account already exists"); return;
  }
  if(firebaseEnabled){
    db.collection("accounts").add({name});
  }else{
    state.accounts.push({id:uid(), name});
    saveLocalAccounts();
    render();
  }
  showToast("Account added");
}
function deleteAccount(id){
  if(firebaseEnabled){ db.collection("accounts").doc(id).delete(); }
  else{ state.accounts = state.accounts.filter(a=>a.id!==id); saveLocalAccounts(); render(); }
  showToast("Account deleted");
}

// ---------- Data operations: Sub Accounts ----------
function addSubAccount(name){
  name = name.trim();
  if(!name) return;
  if(state.subAccounts.some(a=>a.name.toLowerCase()===name.toLowerCase())){
    showToast("Sub account already exists"); return;
  }
  if(firebaseEnabled){
    db.collection("subAccounts").add({name});
  }else{
    state.subAccounts.push({id:uid(), name});
    saveLocalSubAccounts();
    render();
  }
  showToast("Sub account added");
}
function deleteSubAccount(id){
  if(firebaseEnabled){ db.collection("subAccounts").doc(id).delete(); }
  else{ state.subAccounts = state.subAccounts.filter(a=>a.id!==id); saveLocalSubAccounts(); render(); }
  showToast("Sub account deleted");
}

// ---------- Data operations: Entries (double-entry vouchers) ----------
function nextRef(){
  const maxRef = state.entries.reduce((m,e)=>Math.max(m, Number(e.ref)||0), 0);
  return maxRef + 1;
}

function postEntry({date, debitAccount, creditAccount, subAccount, description, amount}){
  const ref = nextRef();
  const createdAt = Date.now();
  const row1 = {ref, date, account:debitAccount, subAccount:subAccount||"", description, debit:amount, credit:0, createdAt};
  const row2 = {ref, date, account:creditAccount, subAccount:subAccount||"", description, debit:0, credit:amount, createdAt};
  if(firebaseEnabled){
    const batch = db.batch();
    batch.set(db.collection("entries").doc(), row1);
    batch.set(db.collection("entries").doc(), row2);
    batch.commit();
  }else{
    state.entries.push({id:uid(), ...row1});
    state.entries.push({id:uid(), ...row2});
    saveLocalEntries();
  }
  showToast("Entry posted — Ref #" + ref);
}

function updateVoucher(ref, {date, debitAccount, creditAccount, subAccount, description, amount}){
  const rows = state.entries.filter(e=>Number(e.ref)===Number(ref));
  if(rows.length < 2){ showToast("Could not find original voucher rows"); return; }
  const drRowId = rows[0].id, crRowId = rows[1].id;
  const row1 = {ref:Number(ref), date, account:debitAccount, subAccount:subAccount||"", description, debit:amount, credit:0, createdAt: rows[0].createdAt || Date.now()};
  const row2 = {ref:Number(ref), date, account:creditAccount, subAccount:subAccount||"", description, debit:0, credit:amount, createdAt: rows[1].createdAt || Date.now()};
  if(firebaseEnabled){
    const batch = db.batch();
    batch.set(db.collection("entries").doc(drRowId), row1);
    batch.set(db.collection("entries").doc(crRowId), row2);
    batch.commit();
  }else{
    state.entries = state.entries.map(e=>{
      if(e.id===drRowId) return {id:drRowId, ...row1};
      if(e.id===crRowId) return {id:crRowId, ...row2};
      return e;
    });
    saveLocalEntries();
  }
  showToast("Entry updated — Ref #" + ref);
}

function deleteVoucher(ref){
  const rowIds = state.entries.filter(e=>Number(e.ref)===Number(ref)).map(e=>e.id);
  if(firebaseEnabled){
    const batch = db.batch();
    rowIds.forEach(id=> batch.delete(db.collection("entries").doc(id)));
    batch.commit();
  }else{
    state.entries = state.entries.filter(e=>Number(e.ref)!==Number(ref));
    saveLocalEntries();
    render();
  }
  showToast("Voucher #" + ref + " deleted");
}

// ---------- Import old data from Excel ----------
function downloadImportTemplate(){
  const sample = [
    {"Date":"2026-01-15","Debit Account":"Cash in Hand","Credit Account":"Donations Received","Sub Account":"","Description":"Sample row — replace with your real data","Amount":5000}
  ];
  const ws = XLSX.utils.json_to_sheet(sample);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Import Template");
  XLSX.writeFile(wb, "US_Accounting_Pro_Import_Template.xlsx");
  showToast("Template downloaded");
}

function parseImportFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:"array", cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, {raw:false, defval:""});
      processImportRows(json);
    }catch(err){
      console.error(err);
      showToast("Could not read the file — please use the provided template.");
    }
  };
  reader.readAsArrayBuffer(file);
}

function getField(row, key){
  const found = Object.keys(row).find(k=>k.trim().toLowerCase()===key.toLowerCase());
  return found ? row[found] : "";
}

function normalizeDate(raw){
  if(!raw) return "";
  const d = new Date(raw);
  if(!isNaN(d.getTime())){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  return String(raw).trim();
}

function processImportRows(json){
  const valid = [];
  const errors = [];
  json.forEach((row,i)=>{
    const date = normalizeDate(getField(row,"Date"));
    const debitAccount = String(getField(row,"Debit Account")).trim();
    const creditAccount = String(getField(row,"Credit Account")).trim();
    const subAccount = String(getField(row,"Sub Account")).trim();
    const description = String(getField(row,"Description")).trim();
    const amount = parseFloat(getField(row,"Amount"));

    if(!date || !debitAccount || !creditAccount || !description || !amount || amount<=0){
      errors.push("Row " + (i+2) + ": missing or invalid data, skipped.");
      return;
    }
    if(debitAccount.toLowerCase() === creditAccount.toLowerCase()){
      errors.push("Row " + (i+2) + ": Debit and Credit accounts are the same, skipped.");
      return;
    }
    valid.push({date, debitAccount, creditAccount, subAccount, description, amount});
  });

  if(valid.length===0){
    showToast("No valid rows found in the file.");
    if(errors.length) console.warn(errors.join("\n"));
    return;
  }

  let summary = valid.length + " valid voucher(s) found";
  if(errors.length) summary += ", " + errors.length + " row(s) will be skipped";
  summary += ". Enter your password to add them to your records.";
  if(errors.length) console.warn(errors.join("\n"));

  requirePasswordThen("Confirm Import", summary, ()=> bulkImportVouchers(valid));
}

function bulkImportVouchers(rows){
  const existingAcc = new Set(state.accounts.map(a=>a.name.toLowerCase()));
  const existingSub = new Set(state.subAccounts.map(a=>a.name.toLowerCase()));
  const newAccounts = new Set();
  const newSubs = new Set();
  rows.forEach(r=>{
    if(!existingAcc.has(r.debitAccount.toLowerCase())) newAccounts.add(r.debitAccount);
    if(!existingAcc.has(r.creditAccount.toLowerCase())) newAccounts.add(r.creditAccount);
    if(r.subAccount && !existingSub.has(r.subAccount.toLowerCase())) newSubs.add(r.subAccount);
  });
  newAccounts.forEach(name=> addAccount(name));
  newSubs.forEach(name=> addSubAccount(name));

  let ref = nextRef();
  const createdAt = Date.now();
  const allRows = [];
  rows.forEach(r=>{
    allRows.push({ref, date:r.date, account:r.debitAccount, subAccount:r.subAccount||"", description:r.description, debit:r.amount, credit:0, createdAt});
    allRows.push({ref, date:r.date, account:r.creditAccount, subAccount:r.subAccount||"", description:r.description, debit:0, credit:r.amount, createdAt});
    ref++;
  });

  if(firebaseEnabled){
    let idx = 0;
    function nextChunk(){
      if(idx >= allRows.length){ showToast("Import complete — " + rows.length + " voucher(s) added."); return; }
      const batch = db.batch();
      const chunk = allRows.slice(idx, idx+450);
      chunk.forEach(r=> batch.set(db.collection("entries").doc(), r));
      batch.commit().then(()=>{ idx += 450; nextChunk(); }).catch(err=>{
        console.error(err); showToast("Import error — check browser console.");
      });
    }
    nextChunk();
  }else{
    allRows.forEach(r=> state.entries.push({id:uid(), ...r}));
    saveLocalEntries();
    render();
    showToast("Import complete — " + rows.length + " voucher(s) added.");
  }
}

// ---------- Formatting ----------
function fmt(n){
  n = Number(n)||0;
  return n.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtBalance(n){
  const v = Number(n)||0;
  if(v === 0) return fmt(0);
  return fmt(Math.abs(v)) + (v>0 ? " Dr" : " Cr");
}
function fmtSigned(n){
  const v = Number(n)||0;
  return (v>=0 ? "+" : "-") + fmt(Math.abs(v));
}
function todayISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

// ---------- Navigation ----------
function goto(screen){
  state.screen = screen;
  if(screen !== "entry") state.editingRef = null;
  render();
  window.scrollTo(0,0);
}

// ---------- Password-protected confirm modal ----------
function requirePasswordThen(title, message, onConfirm){
  state.modal = { title, message, onConfirm };
  renderModal();
}
function closeModal(){
  state.modal = null;
  renderModal();
}

function render(){
  const app = document.getElementById("app");
  if(!state.loggedIn){
    app.innerHTML = renderLogin();
    bindLogin();
    renderModal();
    return;
  }
  let html = "";
  switch(state.screen){
    case "dashboard": html = renderDashboard(); break;
    case "entry": html = renderEntryForm(); break;
    case "backoffice": html = renderBackOffice(); break;
    case "settings": html = renderSettings(); break;
    case "records": html = renderRecords(); break;
    case "summary": html = renderAccountSummary(); break;
    case "reports": html = renderReports(); break;
    case "export": html = renderExport(); break;
    default: html = renderDashboard();
  }
  app.innerHTML = html;
  bindScreen(state.screen);
  renderModal();
}

function renderModal(){
  const root = document.getElementById("modalRoot");
  if(!state.modal){ root.innerHTML = ""; return; }
  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <h3>${escapeHtml(state.modal.title)}</h3>
        <p>${escapeHtml(state.modal.message)}</p>
        <label>Enter Password</label>
        <input type="password" id="modalPassInput" placeholder="Password">
        <div class="error-msg" id="modalErr"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" id="modalCancel">Cancel</button>
          <button class="btn btn-red" id="modalConfirm">Confirm</button>
        </div>
      </div>
    </div>
  `;
  const passInput = document.getElementById("modalPassInput");
  document.getElementById("modalCancel").addEventListener("click", closeModal);
  const doConfirm = ()=>{
    const val = passInput.value;
    if(val !== getPassword()){
      document.getElementById("modalErr").textContent = "Incorrect password.";
      return;
    }
    const cb = state.modal.onConfirm;
    closeModal();
    cb();
  };
  document.getElementById("modalConfirm").addEventListener("click", doConfirm);
  passInput.addEventListener("keydown", e=>{ if(e.key==="Enter") doConfirm(); });
  passInput.focus();
}

// ---------- VIEW RECORDS (table) ----------
const REC_COLUMNS = [
  {key:"ref", label:"Ref#"},
  {key:"date", label:"Date"},
  {key:"account", label:"Account"},
  {key:"subAccount", label:"Sub Account"},
  {key:"description", label:"Description"},
  {key:"debit", label:"Debit"},
  {key:"credit", label:"Credit"}
];

function getFilteredSortedRecords(){
  const f = state.viewFilters;
  let rows = state.entries.slice();
  rows = rows.filter(e=>{
    if(f.date && e.date !== f.date) return false;
    if(f.account && !e.account.toLowerCase().includes(f.account.toLowerCase())) return false;
    if(f.subAccount && !(e.subAccount||"").toLowerCase().includes(f.subAccount.toLowerCase())) return false;
    if(f.description && !(e.description||"").toLowerCase().includes(f.description.toLowerCase())) return false;
    if(f.ref && String(e.ref) !== String(f.ref)) return false;
    if(f.debit && !(Number(e.debit)||0).toString().includes(f.debit)) return false;
    if(f.credit && !(Number(e.credit)||0).toString().includes(f.credit)) return false;
    return true;
  });

  const col = state.sortCol, dir = state.sortDir;
  rows.sort((a,b)=>{
    let va = a[col], vb = b[col];
    if(col==="ref" || col==="debit" || col==="credit"){ va = Number(va)||0; vb = Number(vb)||0; }
    else { va = (va||"").toString().toLowerCase(); vb = (vb||"").toString().toLowerCase(); }
    if(va < vb) return dir==="asc" ? -1 : 1;
    if(va > vb) return dir==="asc" ? 1 : -1;
    return 0;
  });
  return rows;
}

function renderRecords(){

// ---------- ACCOUNT SUMMARY (all accounts + sub accounts, Debit/Credit/Balance) ----------
function renderAccountSummary(){
  const from = state._acctFrom || "";
  const to = state._acctTo || "";
  let rows = state.entries.slice();
  if(from) rows = rows.filter(e=>e.date>=from);
  if(to) rows = rows.filter(e=>e.date<=to);

  const acctMap = {};
  state.accounts.forEach(a=>{ acctMap[a.name] = {debit:0, credit:0}; });
  rows.forEach(e=>{
    if(!acctMap[e.account]) acctMap[e.account] = {debit:0, credit:0};
    acctMap[e.account].debit += Number(e.debit)||0;
    acctMap[e.account].credit += Number(e.credit)||0;
  });
  const acctNames = Object.keys(acctMap).sort((a,b)=>a.localeCompare(b));

  const subMap = {};
  state.subAccounts.forEach(a=>{ subMap[a.name] = {debit:0, credit:0}; });
  rows.forEach(e=>{
    const sn = e.subAccount || "";
    if(!sn) return;
    if(!subMap[sn]) subMap[sn] = {debit:0, credit:0};
    subMap[sn].debit += Number(e.debit)||0;
    subMap[sn].credit += Number(e.credit)||0;
  });
  const subNames = Object.keys(subMap).sort((a,b)=>a.localeCompare(b));

  const buildRows = (names, map)=> names.length ? names.map(name=>{
    const v = map[name];

    </tr>`;
  }).join("") : `<tr><td colspan="4"><div class="empty-state">Nothing to show yet.</div></td></tr>`;

  const acctRows = buildRows(acctNames, acctMap);
  const subRows = buildRows(subNames, subMap);

  return `

function renderLedgerReport(){
  const accOpts = state.accounts.map(a=>`<option value="${escapeHtml(a.name)}" ${a.name===state._ledgerAccount?'selected':''}>${escapeHtml(a.name)}</option>`).join("");
  const subOpts = state.subAccounts.map(a=>`<option value="${escapeHtml(a.name)}" ${a.name===state._ledgerSub?'selected':''}>${escapeHtml(a.name)}</option>`).join("");
  const sel = state._ledgerAccount || "";
  const subSel = state._ledgerSub || "";
  const from = state._ledgerFrom || "";
  const to = state._ledgerTo || "";

  let rowsHtml = `<div class="empty-state">Select an account to view its ledger.</div>`;
  if(sel){
    let rows = state.entries.filter(e=>e.account===sel);
    if(subSel) rows = rows.filter(e=>(e.subAccount||"")===subSel);
    if(from) rows = rows.filter(e=>e.date>=from);
    if(to) rows = rows.filter(e=>e.date<=to);
    rows.sort((a,b)=> a.date.localeCompare(b.date) || a.ref-b.ref);
    let bal = 0;
    const lines = rows.map(e=>{
      bal += (Number(e.debit)||0) - (Number(e.credit)||0);
      return `
      <div class="ledger-row">
        <span>${e.date}</span>
        <span>${escapeHtml(e.description||"")}</span>
        <span class="num" style="color:var(--red)">${e.debit>0?fmt(e.debit):""}</span>
        <span class="num" style="color:var(--green)">${e.credit>0?fmt(e.credit):""}</span>
        <span class="num">${fmt(bal)}</span>
      </div>`;
    }).join("");
    rowsHtml = rows.length ? `
      <div class="ledger-row head">
        <span>Date</span><span>Desc</span><span class="num">Debit</span><span class="num">Credit</span><span class="num">Balance</span>
      </div>
      ${lines}
    ` : `<div class="empty-state">No entries for this account in the selected range.</div>`;
  }

  return `
    <label>Account</label>
    <select id="ledgerAccSel">
      <option value="">Select account</option>
      ${accOpts}
    </select>
    <label>Sub Account (optional filter)</label>
    <select id="ledgerSubSel">
      <option value="">All sub accounts</option>
      ${subOpts}
    </select>
    <div class="field-row2">
      <div><label>From</label><input type="date" id="ledgerFrom" value="${from}"></div>
      <div><label>To</label><input type="date" id="ledgerTo" value="${to}"></div>
    </div>
    ${rowsHtml}
  `;
}

function renderBalanceReport(){
  const from = state._balFrom || "";
  const to = state._balTo || "";
  const subSel = state._balSub || "";
  const subOpts = state.subAccounts.map(a=>`<option value="${escapeHtml(a.name)}" ${a.name===subSel?'selected':''}>${escapeHtml(a.name)}</option>`).join("");
  let rows = state.entries.slice();
  if(from) rows = rows.filter(e=>e.date>=from);
  if(to) rows = rows.filter(e=>e.date<=to);
  if(subSel) rows = rows.filter(e=>(e.subAccount||"")===subSel);
  const totalDebit = rows.reduce((s,e)=>s+(Number(e.debit)||0),0);
  const totalCredit = rows.reduce((s,e)=>s+(Number(e.credit)||0),0);
  const diff = totalDebit - totalCredit;
  return `
    <label>Sub Account (optional filter)</label>
    <select id="balSubSel">
      <option value="">All sub accounts</option>
      ${subOpts}
    </select>
    <div class="field-row2">
      <div><label>From</label><input type="date" id="balFrom" value="${from}"></div>
      <div><label>To</label><input type="date" id="balTo" value="${to}"></div>
    </div>
    <div class="summary-box">
      <div class="summary-row"><span>Total Debit</span><span class="debit-val">${fmt(totalDebit)}</span></div>
      <div class="summary-row"><span>Total Credit</span><span class="credit-val">${fmt(totalCredit)}</span></div>
      <div class="summary-row diff"><span>Difference</span><span class="${diff===0?'zero':'nonzero'}">${fmt(diff)}</span></div>
    </div>
  `;
}

// ---------- EXPORT ----------
function getExportFilteredRows(){
  const from = state._expFrom || "";
  const to = state._expTo || "";
  const acc = state._expAccount || "";
  const sub = state._expSub || "";
  const search = (state._expSearch||"").toLowerCase().trim();
  let rows = state.entries.slice();
  if(from) rows = rows.filter(e=>e.date>=from);
  if(to) rows = rows.filter(e=>e.date<=to);
  if(acc) rows = rows.filter(e=>e.account===acc);
  if(sub) rows = rows.filter(e=>(e.subAccount||"")===sub);
  if(search){
    rows = rows.filter(e=>
      (e.account||"").toLowerCase().includes(search) ||
      (e.subAccount||"").toLowerCase().includes(search) ||
      (e.description||"").toLowerCase().includes(search) ||
      String(e.ref).includes(search) ||
      (e.date||"").includes(search)
    );
  }
  rows.sort((a,b)=>a.ref-b.ref);
  return rows;
}

function renderExport(){
  const from = state._expFrom || "";
  const to = state._expTo || "";
  const acc = state._expAccount || "";
  const sub = state._expSub || "";
  const search = state._expSearch || "";
  const accOpts = state.accounts.map(a=>`<option value="${escapeHtml(a.name)}" ${a.name===acc?'selected':''}>${escapeHtml(a.name)}</option>`).join("");
  const subOpts = state.subAccounts.map(a=>`<option value="${escapeHtml(a.name)}" ${a.name===sub?'selected':''}>${escapeHtml(a.name)}</option>`).join("");
  const matched = getExportFilteredRows();
  const totalDebit = matched.reduce((s,e)=>s+(Number(e.debit)||0),0);
  const totalCredit = matched.reduce((s,e)=>s+(Number(e.credit)||0),0);
  const net = totalDebit - totalCredit;
  return `
  <div class="subheader">
    <button class="back-btn" data-nav="dashboard">⬅️ Back</button>
    <h2>Export</h2>
  </div>
  <div class="content">
    <div class="card-section">
      <h3>🔎 Filters</h3>
      <div class="field-row2">
        <div><label>From</label><input type="date" id="expFrom" value="${from}"></div>
        <div><label>To</label><input type="date" id="expTo" value="${to}"></div>
      </div>
      <label>Account</label>
      <select id="expAccount">
        <option value="">All accounts</option>
        ${accOpts}
      </select>
      <label>Sub Account</label>
      <select id="expSub">
        <option value="">All sub accounts</option>
        ${subOpts}
      </select>
      <label>Search (account, sub account, description, ref, date)</label>
      <input type="text" id="expSearch" placeholder="Type to search..." value="${escapeAttr(search)}">
      <p class="hint" style="margin-top:0;">Leave filters blank to export everything. ${matched.length} record(s) match right now.</p>
    </div>

    <div class="summary-box" style="margin-bottom:16px;">
      <div class="summary-row"><span>Matched Debit</span><span class="debit-val">${fmt(totalDebit)}</span></div>
      <div class="summary-row"><span>Matched Credit</span><span class="credit-val">${fmt(totalCredit)}</span></div>
      <div class="summary-row"><span>Net Amount</span><span class="${net>=0?'pos':'neg'}">${fmtSigned(net)}</span></div>
    </div>

    <button class="btn btn-red" id="exportPdfBtn" style="margin-bottom:12px;">📄 Export PDF (A4)</button>
    <button class="btn btn-green" id="exportXlsBtn">📊 Export Excel (.xlsx)</button>
  </div>
  `;
}

function doExportPdf(rows){
  rows = rows || state.entries.slice().sort((a,b)=>a.ref-b.ref);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait", unit:"pt", format:"a4"});
  const now = new Date();
  doc.setFontSize(16);
  doc.text("US Accounting Pro", 40, 40);
  doc.setFontSize(10);
  doc.text("Print Date & Time: " + now.toLocaleString(), 40, 58);

  const accountNames = [...new Set(rows.map(e=>e.account))].sort((a,b)=>a.localeCompare(b));
  const body = [];
  let grandDebit = 0, grandCredit = 0;
  accountNames.forEach(acc=>{
    const groupRows = rows.filter(e=>e.account===acc).sort((a,b)=> a.date.localeCompare(b.date) || a.ref-b.ref);
    let bal = 0;
    groupRows.forEach(e=>{
      bal += (Number(e.debit)||0) - (Number(e.credit)||0);
      grandDebit += Number(e.debit)||0;
      grandCredit += Number(e.credit)||0;
      body.push([e.ref, e.date, e.account, e.subAccount||"", e.description||"", e.debit>0?fmt(e.debit):"", e.credit>0?fmt(e.credit):""]);
    });
    body.push([
      { content: "Balance — " + acc, colSpan:6, styles:{fontStyle:"bold", halign:"right", fillColor:[245,247,250]} },
      { content: fmtBalance(bal), styles:{fontStyle:"bold", fillColor:[245,247,250], textColor: bal>=0 ? [26,158,92] : [214,50,60]} }
    ]);
  });

  doc.autoTable({
    startY: 72,
    head: [["Ref#","Date","Account","Sub Account","Description","Debit","Credit"]],
    body: body,
    styles:{ fontSize:8 },
    headStyles:{ fillColor:[30,95,191] },
    margin:{left:40, right:40}
  });

  let finalY = doc.lastAutoTable.finalY + 22;
  if(finalY > 780){ doc.addPage(); finalY = 50; }
  doc.setFontSize(10);
  doc.setFont(undefined,"bold");
  doc.text("Grand Total Debit: " + fmt(grandDebit), 40, finalY);
  doc.text("Grand Total Credit: " + fmt(grandCredit), 40, finalY+16);
  doc.text("Net Difference: " + fmt(grandDebit-grandCredit), 40, finalY+32);
  doc.setFont(undefined,"normal");

  doc.save("US_Accounting_Pro_Export.pdf");
  showToast("PDF exported (" + rows.length + " records)");
}

function doExportXlsx(rows){
  rows = rows || state.entries.slice().sort((a,b)=>a.ref-b.ref);
  const accountNames = [...new Set(rows.map(e=>e.account))].sort((a,b)=>a.localeCompare(b));
  const data = [];
  let grandDebit = 0, grandCredit = 0;
  accountNames.forEach(acc=>{
    const groupRows = rows.filter(e=>e.account===acc).sort((a,b)=> a.date.localeCompare(b.date) || a.ref-b.ref);
    let bal = 0;
    groupRows.forEach(e=>{
      bal += (Number(e.debit)||0) - (Number(e.credit)||0);
      grandDebit += Number(e.debit)||0;
      grandCredit += Number(e.credit)||0;
      data.push({"Ref#":e.ref,"Date":e.date,"Account":e.account,"Sub Account":e.subAccount||"","Description":e.description||"","Debit":e.debit>0?Number(e.debit):"","Credit":e.credit>0?Number(e.credit):"","Balance":""});
    });
    data.push({"Ref#":"","Date":"","Account":"Balance — "+acc,"Sub Account":"","Description":"","Debit":"","Credit":"","Balance":fmtBalance(bal)});
  });
  data.push({"Ref#":"","Date":"","Account":"GRAND TOTAL","Sub Account":"","Description":"","Debit":grandDebit,"Credit":grandCredit,"Balance":fmtBalance(grandDebit-grandCredit)});

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Entries");
  XLSX.writeFile(wb, "US_Accounting_Pro_Export.xlsx");
  showToast("Excel exported (" + rows.length + " records)");
}

// ---------- Helpers ----------
function escapeHtml(str){
  return String(str==null?"":str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str){ return escapeHtml(str||""); }

function bindScreen(screen){
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=> goto(el.getAttribute("data-nav")));
  });
  const fab = document.getElementById("fabNew");
  if(fab) fab.addEventListener("click", ()=>{ state.editingRef = null; goto("entry"); });

  if(screen==="entry") bindEntryForm();
  if(screen==="backoffice") bindBackOffice();
  if(screen==="settings") bindSettings();
  if(screen==="records") bindRecords();
  if(screen==="summary") bindAccountSummary();
  if(screen==="reports") bindReports();
  if(screen==="export") bindExport();
}

function bindEntryForm(){
  const form = document.getElementById("entryForm");
  const isEdit = !!state.editingRef;
  form.addEventListener("submit", e=>{
    e.preventDefault();
    const date = document.getElementById("f_date").value;
    const debitAccount = document.getElementById("f_debit").value;
    const creditAccount = document.getElementById("f_credit").value;
    const subManual = document.getElementById("f_sub_manual").value.trim();
    const subSelect = document.getElementById("f_sub").value;
    const subAccount = subManual || subSelect;
    const description = document.getElementById("f_desc").value.trim();
    const amount = parseFloat(document.getElementById("f_amount").value);
    const err = document.getElementById("entryErr");

    if(!debitAccount || !creditAccount){ err.textContent = "Select both Debit and Credit accounts."; return; }
    if(debitAccount === creditAccount){ err.textContent = "Debit and Credit accounts must be different."; return; }
    if(!description){ err.textContent = "Description is required."; return; }
    if(!amount || amount<=0){ err.textContent = "Enter a valid amount."; return; }

    if(subManual && !state.subAccounts.some(a=>a.name.toLowerCase()===subManual.toLowerCase())){
      addSubAccount(subManual);
    }

    if(isEdit){
      const doUpdate = ()=> {
        updateVoucher(state.editingRef, {date, debitAccount, creditAccount, subAccount, description, amount});
        goto("records");
      };
      requirePasswordThen("Confirm Edit", "Enter your password to save changes to Voucher #" + state.editingRef + ".", doUpdate);
    }else{
      postEntry({date, debitAccount, creditAccount, subAccount, description, amount});
      goto("dashboard");
    }
  });
}

function bindSettings(){
  document.getElementById("changePassBtn").addEventListener("click", ()=>{
    const cur = document.getElementById("curPass").value;
    const np = document.getElementById("newPass").value;

      render();
      const again = document.querySelector(`[data-filt="${focusKey}"]`);
      if(again){

        again.setSelectionRange(v.length, v.length);
      }

      const key = th.getAttribute("data-sort");

      else { state.sortCol = key; state.sortDir = "asc"; }
      render();
    });
  });
  document.querySelectorAll("[data-edit-ref]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const ref = btn.getAttribute("data-edit-ref");

  document.querySelectorAll("[data-del-ref]").forEach(btn=>{

// ---------- PWA setup (installable app / Add to Home Screen) ----------
function setupPWA(){
  try{
    const svgIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="90" fill="#1e5fbf"/><text x="50%" y="60%" font-size="230" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold">US</text></svg>';
    const iconDataUrl = "data:image/svg+xml;base64," + btoa(svgIcon);

    const manifest = {
      name: "US Accounting Pro",
      short_name: "US Accounting",
      start_url: location.href.split("#")[0],
      display: "standalone",
      background_color: "#ffffff",
      theme_color: "#1e5fbf",
      icons: [
        { src: iconDataUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any" },
        { src: iconDataUrl, sizes: "512x512", type: "image/svg+xml", purpose: "maskable" }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
    const manifestUrl = URL.createObjectURL(manifestBlob);

    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = manifestUrl;
    document.head.appendChild(link);

    const appleIcon = document.createElement("link");
    appleIcon.rel = "apple-touch-icon";
    appleIcon.href = iconDataUrl;
    document.head.appendChild(appleIcon);

    const themeMeta = document.createElement("meta");
    themeMeta.name = "theme-color";
    themeMeta.content = "#1e5fbf";
    document.head.appendChild(themeMeta);

    const appleCapable = document.createElement("meta");
    appleCapable.name = "apple-mobile-web-app-capable";
    appleCapable.content = "yes";
    document.head.appendChild(appleCapable);

    const appleStatus = document.createElement("meta");
    appleStatus.name = "apple-mobile-web-app-status-bar-style";
    appleStatus.content = "black-translucent";
    document.head.appendChild(appleStatus);

    const appleTitle = document.createElement("meta");
    appleTitle.name = "apple-mobile-web-app-title";
    appleTitle.content = "US Accounting";
    document.head.appendChild(appleTitle);

    // NOTE: We intentionally do NOT register a service worker here.
    // A blob:-URL-based service worker was tried earlier but caused some
    // phones to get permanently "stuck" on an old cached version of the
    // app, because the browser treated it as a distinct script every
    // reload and mismanaged updates. Manifest + icons above are enough
    // for "Add to Home Screen" without that risk.
  }catch(e){
    console.warn("PWA setup skipped:", e);
  }
}

// ---------- Cleanup: remove any service worker stuck from an earlier version ----------
// If this device previously loaded a version of the app that registered a
// service worker, that old worker can keep serving a cached/old copy of the
// page even after clearing cache. This removes it so the browser goes back
// to loading the page fresh from the network every time.
function cleanupOldServiceWorkers(){
  if("serviceWorker" in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(reg=> reg.unregister());
    }).catch(()=>{});
    if(window.caches && caches.keys){
      caches.keys().then(names=> names.forEach(n=> caches.delete(n))).catch(()=>{});
    }
  }
}

// ============================================================
// INIT
// ============================================================
loadLocal();
initFirebase();
cleanupOldServiceWorkers();
setupPWA();
render();
</script>
</body>
